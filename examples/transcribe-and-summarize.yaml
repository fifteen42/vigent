# 示例工作流：音视频转录 + AI 总结
# 用法: vigent workflow run examples/transcribe-and-summarize.yaml
name: 音视频转录与总结
description: 上传音频/视频 → Gemini 转录 → Claude 生成结构化笔记

steps:
  - id: transcribe
    name: 转录音视频
    action:
      type: transcribe
      path: "input/recording.mp4"
      language: "zh"
    outputVar: TRANSCRIPT

  - id: summarize
    name: 生成结构化笔记
    dependsOn: [transcribe]
    action:
      type: run
      task: "将以下转录内容整理成结构化 Markdown 笔记，包含：摘要、关键点、行动项。转录：{{TRANSCRIPT}}"
    outputVar: NOTES

  - id: save_notes
    name: 保存笔记
    dependsOn: [summarize]
    action:
      type: shell
      command: "echo '{{NOTES}}' > output/meeting_notes.md && echo '笔记已保存'"
